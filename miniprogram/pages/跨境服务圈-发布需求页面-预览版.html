<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>跨境服务圈 - 发布需求</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .phone-container {
            width: 375px;
            height: 812px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* 导航栏（与首页、消息页一致） */
        .nav-bar {
            background: white;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            border-bottom: 0.5px solid #e0e0e0;
            flex-shrink: 0;
            z-index: 100;
        }

        .nav-back {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #000;
            font-size: 15px;
            padding-right: 12px;
        }

        .nav-title {
            font-size: 17px;
            font-weight: 600;
            color: #000;
            flex: 1;
            text-align: center;
            margin-right: 40px; /* 平衡左侧返回按钮的宽度 */
        }

        /* 可滚动区域：表单 */
        .form-scroll {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            background: white;
        }

        .form-scroll::-webkit-scrollbar {
            display: none;
        }

        .form-group {
            padding: 16px;
            border-bottom: 0.5px solid #f0f0f0;
        }

        .form-label {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
            display: block;
        }

        .required::after {
            content: ' *';
            color: #ff3b30;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 0.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            color: #333;
            outline: none;
            background: white;
        }

        .form-input::placeholder {
            color: #999;
        }

        .form-textarea {
            width: 100%;
            padding: 10px 12px;
            border: 0.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            color: #333;
            outline: none;
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
        }

        .form-textarea::placeholder {
            color: #999;
        }

        /* 分类选择 */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .category-option {
            padding: 10px;
            border: 0.5px solid #e0e0e0;
            border-radius: 8px;
            text-align: center;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }

        .category-option.selected {
            background: #07C160;
            color: white;
            border-color: #07C160;
        }

        /* 提交按钮 */
        .submit-btn {
            margin: 20px 16px;
            padding: 12px;
            background: #07C160;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            width: calc(100% - 32px);
        }

        /* 底部安全距离（无tab时不需要太大） */
        .safe-bottom {
            height: 20px;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <!-- 导航栏（带返回按钮） -->
        <div class="nav-bar">
            <div class="nav-back">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
                <span>返回</span>
            </div>
            <h1 class="nav-title">发布需求</h1>
        </div>

        <!-- 可滚动区域：表单 -->
        <div class="form-scroll">
            <!-- 需求标题 -->
            <div class="form-group">
                <label class="form-label required">需求标题</label>
                <input type="text" class="form-input" placeholder="请输入需求标题，例如：寻找美国海外仓服务">
            </div>

            <!-- 需求分类 -->
            <div class="form-group">
                <label class="form-label required">需求分类</label>
                <div class="category-grid">
                    <div class="category-option selected">跨境物流</div>
                    <div class="category-option">支付结算</div>
                    <div class="category-option">合规认证</div>
                    <div class="category-option">海外仓</div>
                    <div class="category-option">营销推广</div>
                    <div class="category-option">其他需求</div>
                </div>
            </div>

            <!-- 需求描述 -->
            <div class="form-group">
                <label class="form-label required">需求描述</label>
                <textarea class="form-textarea" placeholder="请详细描述您的需求，包括具体要求、预期效果等"></textarea>
            </div>

            <!-- 联系电话 -->
            <div class="form-group">
                <label class="form-label required">联系电话</label>
                <input type="tel" class="form-input" placeholder="请输入联系电话">
            </div>

            <!-- 需求地区 -->
            <div class="form-group">
                <label class="form-label required">需求地区</label>
                <input type="text" class="form-input" placeholder="请输入需求地区，例如：美国、欧洲">
            </div>

            <!-- 补充说明 -->
            <div class="form-group">
                <label class="form-label">补充说明</label>
                <textarea class="form-textarea" placeholder="如有其他需要说明的内容，请在此补充（选填）"></textarea>
            </div>

            <!-- 提交按钮 -->
            <button class="submit-btn">发布需求</button>

            <!-- 底部安全距离 -->
            <div class="safe-bottom"></div>
        </div>
    </div>

    <script>
        // 分类选择
        document.querySelectorAll('.category-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.category-option').forEach(opt => opt.classList.remove('selected'));
                this.classList.add('selected');
            });
        });
    </script>
</body>
</html>
