<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>跨境服务圈 - 商家主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .phone-container {
            width: 375px;
            height: 812px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            position: relative;
        }

        /* 微信状态栏 */
        .wx-status-bar {
            background: white;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #000;
            font-weight: 600;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        /* 导航栏 */
        .nav-bar {
            background: white;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: absolute;
            top: 32px;
            left: 0;
            right: 0;
            z-index: 99;
            border-bottom: 0.5px solid #f0f0f0;
        }

        .nav-title {
            font-size: 17px;
            font-weight: 600;
            color: #000;
            flex: 1;
            text-align: center;
        }

        /* 微信原生胶囊按钮 */
        .wx-capsule {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.6);
            border: 0.5px solid rgba(0, 0, 0, 0.1);
            border-radius: 16px;
            padding: 5px 12px;
            gap: 8px;
        }

        .wx-capsule-divider {
            width: 0.5px;
            height: 14px;
            background: rgba(0, 0, 0, 0.1);
        }

        /* 个人资料区域 */
        .profile-section {
            position: absolute;
            top: 82px;
            left: 0;
            right: 0;
            background: white;
            z-index: 10;
            border-bottom: 0.5px solid #f0f0f0;
        }

        .profile-inner {
            padding: 20px 16px 12px;
        }

        .profile-divider {
            height: 12px;
            background: #f5f5f5;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .profile-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
            position: relative;
        }

        .verified-badge {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 20px;
            height: 20px;
            background: #07C160;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
            border: 2px solid white;
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-size: 20px;
            font-weight: 600;
            color: #000;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .profile-mood {
            font-size: 12px;
            color: #999;
        }

        .profile-stats {
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 0.5px solid #f0f0f0;
            margin-top: 12px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            flex: 1;
            position: relative;
        }

        .stat-item:not(:last-child)::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 0.5px;
            height: 24px;
            background: #e0e0e0;
        }

        .stat-number {
            font-size: 18px;
            font-weight: 600;
            color: #000;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
        }

        /* 内容区域 */
        .content-section {
            position: absolute;
            top: 272px;
            bottom: 58px;
            left: 0;
            right: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            background: #f5f5f5;
        }

        .content-section::-webkit-scrollbar {
            display: none;
        }

        .menu-section {
            background: white;
            margin-bottom: 6px;
        }

        .menu-section-gap {
            height: 6px;
            background: #f5f5f5;
        }

        .menu-list {
            padding: 0 16px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 0.5px solid #f0f0f0;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: #f5f5f5;
        }

        .menu-label {
            font-size: 15px;
            color: #000;
        }

        .menu-count {
            font-size: 14px;
            color: #999;
            margin-left: 8px;
        }

        .menu-arrow {
            color: #999;
            font-size: 14px;
        }

        .menu-badge {
            background: #ff3b30;
            color: white;
            font-size: 11px;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
        }

        /* 底部导航 */
        .tab-bar {
            background: white;
            border-top: 0.5px solid #e0e0e0;
            padding: 8px 0 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 58px;
            z-index: 101;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding-top: 8px;
        }

        .tab-label {
            font-size: 10px;
            font-weight: 500;
        }

        .tab-active {
            color: #07C160;
        }

        .tab-inactive {
            color: #999;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <!-- 微信状态栏 -->
        <div class="wx-status-bar">
            <span>9:41</span>
            <div style="display: flex; gap: 5px; align-items: center;">
                <span>📶</span>
                <span>📡</span>
                <span>🔋</span>
            </div>
        </div>

        <!-- 导航栏 -->
        <div class="nav-bar">
            <div style="width: 60px;"></div>
            <h1 class="nav-title">商家主页</h1>
            <div class="wx-capsule">
                <!-- 三个点 -->
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round">
                    <circle cx="6" cy="12" r="1.5" fill="#000" stroke="none"/>
                    <circle cx="12" cy="12" r="1.5" fill="#000" stroke="none"/>
                    <circle cx="18" cy="12" r="1.5" fill="#000" stroke="none"/>
                </svg>
                <div class="wx-capsule-divider"></div>
                <!-- 设置图标 -->
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
                </svg>
            </div>
        </div>

        <!-- 个人资料区域 -->
        <div class="profile-section">
            <div class="profile-inner">
                <div class="profile-header">
                    <div class="profile-avatar">
                        商
                        <div class="verified-badge">✓</div>
                    </div>
                    <div class="profile-info">
                        <div class="profile-name">跨境物流服务
                        <span style="font-size: 11px; background: #07C160; color: white; padding: 2px 6px; border-radius: 4px; font-weight: 500;">已认证</span>
                    </div>
                        <div class="profile-mood">专业海外仓一件代发</div>
                    </div>
                </div>

                <div class="profile-stats">
                    <div class="stat-item">
                        <span class="stat-number">156</span>
                        <span class="stat-label">粉丝</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number">2,323</span>
                        <span class="stat-label">获赞</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number">89</span>
                        <span class="stat-label">已成交</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number">4.8</span>
                        <span class="stat-label">评分</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 内容区域 -->
        <div class="content-section">
            <!-- 第一组：我的服务、服务订单、评价管理 -->
            <div class="menu-section">
                <div class="menu-list">
                    <div class="menu-item">
                        <div class="menu-left">
                            <div class="menu-icon">📦</div>
                            <span class="menu-label">我的服务</span>
                            <span class="menu-count">8个</span>
                        </div>
                        <span class="menu-arrow">›</span>
                    </div>
                    <div class="menu-item">
                        <div class="menu-left">
                            <div class="menu-icon">📋</div>
                            <span class="menu-label">服务订单</span>
                            <span class="menu-count">23笔</span>
                        </div>
                        <span class="menu-arrow">›</span>
                    </div>
                    <div class="menu-item">
                        <div class="menu-left">
                            <div class="menu-icon">⭐</div>
                            <span class="menu-label">评价管理</span>
                        </div>
                        <span class="menu-arrow">›</span>
                    </div>
                </div>
            </div>

            <!-- 灰色间隔 -->
            <div class="menu-section-gap"></div>

            <!-- 第二组：数据统计、我的消息、系统通知 -->
            <div class="menu-section">
                <div class="menu-list">
                    <div class="menu-item">
                        <div class="menu-left">
                            <div class="menu-icon">📊</div>
                            <span class="menu-label">数据统计</span>
                        </div>
                        <span class="menu-arrow">›</span>
                    </div>
                    <div class="menu-item">
                        <div class="menu-left">
                            <div class="menu-icon">💬</div>
                            <span class="menu-label">我的消息</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <div class="menu-badge">3</div>
                            <span class="menu-arrow">›</span>
                        </div>
                    </div>
                    <div class="menu-item">
                        <div class="menu-left">
                            <div class="menu-icon">🔔</div>
                            <span class="menu-label">系统通知</span>
                        </div>
                        <span class="menu-arrow">›</span>
                    </div>
                </div>
            </div>

            <!-- 灰色间隔 -->
            <div class="menu-section-gap"></div>

            <!-- 第三组：编辑资料、商家认证、帮助与反馈 -->
            <div class="menu-section">
                <div class="menu-list">
                    <div class="menu-item">
                        <div class="menu-left">
                            <div class="menu-icon">👤</div>
                            <span class="menu-label">编辑资料</span>
                        </div>
                        <span class="menu-arrow">›</span>
                    </div>
                    <div class="menu-item">
                        <div class="menu-left">
                            <div class="menu-icon">🏅</div>
                            <span class="menu-label">商家认证</span>
                        </div>
                        <span class="menu-arrow">›</span>
                    </div>
                    <div class="menu-item">
                        <div class="menu-left">
                            <div class="menu-icon">❓</div>
                            <span class="menu-label">帮助与反馈</span>
                        </div>
                        <span class="menu-arrow">›</span>
                    </div>
                    <div class="menu-item">
                        <div class="menu-left">
                            <div class="menu-icon">👤</div>
                            <span class="menu-label">切换个人用户</span>
                        </div>
                        <span class="menu-arrow">›</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部导航 -->
        <div class="tab-bar">
            <div class="tab-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span class="tab-label tab-inactive">首页</span>
            </div>
            <div class="tab-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
                <span class="tab-label tab-inactive">消息</span>
            </div>
            <div class="tab-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="#07C160" stroke="#07C160" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span class="tab-label tab-active">我的</span>
            </div>
        </div>

    </div>
</body>
</html>
