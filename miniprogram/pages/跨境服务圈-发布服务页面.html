<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>跨境服务圈 - 发布服务</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .phone-container {
            width: 375px;
            height: 812px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            position: relative;
        }

        /* 微信状态栏 */
        .wx-status-bar {
            background: white;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #000;
            font-weight: 600;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        /* 导航栏 */
        .nav-bar {
            background: white;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: absolute;
            top: 32px;
            left: 0;
            right: 0;
            z-index: 99;
            border-bottom: 0.5px solid #f0f0f0;
        }

        .nav-back {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #000;
            font-size: 15px;
        }

        .nav-title {
            font-size: 17px;
            font-weight: 600;
            color: #000;
            flex: 1;
            text-align: center;
        }

        .nav-right {
            font-size: 15px;
            color: #07C160;
            font-weight: 500;
        }

        /* 表单区域 */
        .form-section {
            position: absolute;
            top: 82px;
            bottom: 58px;
            left: 0;
            right: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            background: white;
        }

        .form-section::-webkit-scrollbar {
            display: none;
        }

        .form-group {
            padding: 16px;
            border-bottom: 0.5px solid #f0f0f0;
        }

        .form-label {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
            display: block;
        }

        .required::after {
            content: ' *';
            color: #ff3b30;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 0.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            color: #333;
            outline: none;
        }

        .form-input::placeholder {
            color: #999;
        }

        .form-textarea {
            width: 100%;
            padding: 10px 12px;
            border: 0.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            color: #333;
            outline: none;
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
        }

        .form-textarea::placeholder {
            color: #999;
        }

        /* 分类选择 */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .category-option {
            padding: 10px;
            border: 0.5px solid #e0e0e0;
            border-radius: 8px;
            text-align: center;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }

        .category-option.selected {
            background: #07C160;
            color: white;
            border-color: #07C160;
        }

        /* 图片上传 */
        .image-upload-area {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .image-upload-box {
            width: 80px;
            height: 80px;
            border: 1px dashed #e0e0e0;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            color: #999;
            font-size: 11px;
            cursor: pointer;
        }

        .image-preview {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #999;
            position: relative;
        }

        .image-delete {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 18px;
            height: 18px;
            background: #ff3b30;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
        }

        /* 标签选择 */
        .tag-section {
            padding: 16px;
            border-bottom: 0.5px solid #f0f0f0;
        }

        .tag-list {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .tag-option {
            padding: 6px 14px;
            border: 0.5px solid #e0e0e0;
            border-radius: 16px;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .tag-option.tag-selected {
            background: #e8f8ef;
            color: #07C160;
            border-color: #07C160;
        }

        .custom-tag-input-group {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
        }

        .custom-tag-input {
            flex: 1;
            padding: 8px 12px;
            border: 0.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 13px;
            color: #333;
            outline: none;
        }

        .custom-tag-input::placeholder {
            color: #999;
        }

        .custom-tag-add-btn {
            padding: 8px 14px;
            background: #07C160;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .selected-tags-preview {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 6px;
            min-height: 20px;
        }

        .selected-tag-item {
            padding: 4px 10px;
            background: #e8f8ef;
            color: #07C160;
            border-radius: 12px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .selected-tag-remove {
            font-size: 14px;
            cursor: pointer;
            line-height: 1;
            color: #07C160;
        }

        /* 价格输入 */
        .price-input-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .price-symbol {
            font-size: 14px;
            color: #999;
        }

        .price-input {
            flex: 1;
            padding: 10px 12px;
            border: 0.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            color: #333;
            outline: none;
        }

        /* 底部 Tab 栏（商家版） */
        .tab-bar {
            background: white;
            border-top: 0.5px solid #e0e0e0;
            padding: 8px 0 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 58px;
            z-index: 101;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding-top: 8px;
        }

        .tab-label {
            font-size: 10px;
            font-weight: 500;
        }

        .tab-active {
            color: #07C160;
        }

        .tab-inactive {
            color: #999;
        }

        /* 提交按钮 */
        .submit-btn {
            margin: 20px 16px;
            padding: 12px;
            background: #07C160;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            width: calc(100% - 32px);
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <!-- 微信状态栏 -->
        <div class="wx-status-bar">
            <span>9:41</span>
            <div style="display: flex; gap: 5px; align-items: center;">
                <span>📶</span>
                <span>📡</span>
                <span>🔋</span>
            </div>
        </div>

        <!-- 导航栏 -->
        <div class="nav-bar">
            <div class="nav-back">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
                <span>返回</span>
            </div>
            <h1 class="nav-title">发布服务</h1>
            <div style="width: 60px;"></div>
        </div>

        <!-- 表单区域 -->
        <div class="form-section">
            <!-- 服务标题 -->
            <div class="form-group">
                <label class="form-label required">服务标题</label>
                <input type="text" class="form-input" placeholder="请输入服务标题，例如：美国专线物流服务">
            </div>

            <!-- 服务分类 -->
            <div class="form-group">
                <label class="form-label required">服务分类</label>
                <div class="category-grid">
                    <div class="category-option selected">跨境网络</div>
                    <div class="category-option">物流服务</div>
                    <div class="category-option">支付结算</div>
                    <div class="category-option">合规认证</div>
                    <div class="category-option">培训咨询</div>
                    <div class="category-option">其他服务</div>
                </div>
            </div>

            <!-- 服务描述 -->
            <div class="form-group">
                <label class="form-label required">服务描述</label>
                <textarea class="form-textarea" placeholder="请详细描述您的服务内容、优势、适用场景等"></textarea>
            </div>

            <!-- 服务图片 -->
            <div class="form-group">
                <label class="form-label">服务图片</label>
                <div class="image-upload-area">
                    <div class="image-preview" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
                        图片1
                        <div class="image-delete">×</div>
                    </div>
                    <div class="image-preview" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white;">
                        图片2
                        <div class="image-delete">×</div>
                    </div>
                    <div class="image-upload-box">
                        <span style="font-size: 24px;">+</span>
                        <span>上传图片</span>
                    </div>
                </div>
            </div>

            <!-- 服务标签 -->
            <div class="tag-section">
                <label class="form-label">服务标签</label>
                <div class="tag-list" id="fixedTagList">
                    <div class="tag-option" onclick="toggleTag(this)">时效快</div>
                    <div class="tag-option" onclick="toggleTag(this)">价格低</div>
                    <div class="tag-option" onclick="toggleTag(this)">覆盖广</div>
                    <div class="tag-option" onclick="toggleTag(this)">服务好</div>
                    <div class="tag-option" onclick="toggleTag(this)">可追踪</div>
                    <div class="tag-option" onclick="toggleTag(this)">包清关</div>
                    <div class="tag-option" onclick="toggleTag(this)">专线物流</div>
                    <div class="tag-option" onclick="toggleTag(this)">小包服务</div>
                </div>
                <div class="custom-tag-input-group">
                    <input type="text" class="custom-tag-input" id="customTagInput" placeholder="添加自定义标签">
                    <button class="custom-tag-add-btn" onclick="addCustomTag()">添加</button>
                </div>
                <div class="selected-tags-preview" id="selectedTagsPreview"></div>
            </div>

            <!-- 服务价格 -->
            <div class="form-group">
                <label class="form-label required">服务价格</label>
                <div class="price-input-group">
                    <span class="price-symbol">¥</span>
                    <input type="number" class="price-input" placeholder="请输入价格">
                    <span style="font-size: 13px; color: #999;">/件</span>
                </div>
            </div>

            <!-- 服务地区 -->
            <div class="form-group">
                <label class="form-label">服务地区</label>
                <input type="text" class="form-input" placeholder="请输入服务覆盖的地区，例如：美国、欧洲">
            </div>

            <!-- 联系电话 -->
            <div class="form-group">
                <label class="form-label required">联系电话</label>
                <input type="tel" class="form-input" placeholder="请输入联系电话">
            </div>

            <!-- 提交按钮 -->
            <button class="submit-btn">发布服务</button>
        </div>

        <!-- 底部 Tab 栏（商家版） -->
        <div class="tab-bar">
            <div class="tab-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span class="tab-label tab-inactive">首页</span>
            </div>
            <div class="tab-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
                <span class="tab-label tab-inactive">消息</span>
            </div>
            <div class="tab-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span class="tab-label tab-inactive">我的</span>
            </div>
        </div>
    </div>

    <script>
        // 分类选择
        document.querySelectorAll('.category-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.category-option').forEach(opt => opt.classList.remove('selected'));
                this.classList.add('selected');
            });
        });

        // 标签选择
        let selectedTags = [];

        function toggleTag(el) {
            const tagText = el.textContent;
            if (el.classList.contains('tag-selected')) {
                el.classList.remove('tag-selected');
                selectedTags = selectedTags.filter(t => t !== tagText);
            } else {
                el.classList.add('tag-selected');
                selectedTags.push(tagText);
            }
            renderSelectedTags();
        }

        function addCustomTag() {
            const input = document.getElementById('customTagInput');
            const tagText = input.value.trim();
            if (!tagText) return;
            if (selectedTags.includes(tagText)) {
                alert('该标签已添加');
                return;
            }
            selectedTags.push(tagText);
            input.value = '';
            renderSelectedTags();
        }

        // 支持回车添加自定义标签
        document.getElementById('customTagInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                addCustomTag();
            }
        });

        function renderSelectedTags() {
            const container = document.getElementById('selectedTagsPreview');
            container.innerHTML = '';
            selectedTags.forEach(tag => {
                const tagEl = document.createElement('div');
                tagEl.className = 'selected-tag-item';
                tagEl.innerHTML = tag + '<span class="selected-tag-remove" onclick="removeTag(\'' + tag.replace(/'/g, "\\'") + '\')">×</span>';
                container.appendChild(tagEl);
            });
        }

        function removeTag(tagText) {
            selectedTags = selectedTags.filter(t => t !== tagText);
            // 同步取消固定标签的高亮
            document.querySelectorAll('.tag-option').forEach(el => {
                if (el.textContent === tagText) {
                    el.classList.remove('tag-selected');
                }
            });
            renderSelectedTags();
        }
    </script>
</body>
</html>
